name: "📈 WF5: Stats Refresh"

on:
  schedule:
    - cron: "18 4 * * *"  # 04:18 UTC
  workflow_dispatch:

permissions:
  contents: write

jobs:
  stats:
    runs-on: ubuntu-latest
    timeout-minutes: 8

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run stats
        run: python scripts/stats.py

      - name: Commit and push
        run: |
          git config user.name "srikarreddyram"
          git config user.email "srikarreddyram@users.noreply.github.com"
          git add -A
          git diff --staged --quiet || git commit -m "📈 stats refreshed"
          for i in 1 2 3 4 5; do git pull --rebase origin main && git push && break || sleep $((RANDOM % 5 + 1)); done
