name: 📈 Stock Tracking (Market Open)

on:
  schedule:
    - cron: "30 13 * * *"  # 13:30 UTC (09:30 EST) every day
  workflow_dispatch:

permissions:
  contents: write

jobs:
  track:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run stock tracker
        run: python scripts/stocks_tracker.py

      - name: Commit and push
        run: |
          git config user.name "srikarreddyram"
          git config user.email "srikarreddyram@users.noreply.github.com"
          git add aggregated/ai_stocks.csv
          git diff --staged --quiet || git commit -m "📈 stocks: market open $(date -u +%Y-%m-%d)"
          for i in 1 2 3 4 5; do git pull --rebase origin main && git push && break || sleep $((RANDOM % 5 + 1)); done
