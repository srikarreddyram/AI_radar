name: "🏷️ WF2: Daily Classification"

on:
  schedule:
    - cron: "0 2 * * *"  # 02:00 UTC daily
  workflow_dispatch:

permissions:
  contents: write

jobs:
  classify:
    runs-on: ubuntu-latest
    timeout-minutes: 8

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run classification
        run: |
          python scripts/classify.py | tee /tmp/classify_output.txt
          echo "CLASSIFIED=$(grep 'CLASSIFIED_COUNT=' /tmp/classify_output.txt | cut -d= -f2)" >> $GITHUB_ENV
          echo "TOTAL=$(grep 'TOTAL_COUNT=' /tmp/classify_output.txt | cut -d= -f2)" >> $GITHUB_ENV

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --staged --quiet || git commit -m "🏷️ classified: ${{ env.CLASSIFIED || '0' }}/${{ env.TOTAL || '0' }} articles"
          git push
